name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 👉 Permisos necesarios para Pages (a nivel de workflow)
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 👉 Empaqueta la carpeta `dist` que genera Astro
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 👉 Configura GitHub Pages (imprescindible antes de deploy)
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 👉 Publica en GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4